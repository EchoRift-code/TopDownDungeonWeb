<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Mobile Dungeon</title>
        <style>
            body{
                background-color: black; /*Alternate is #222*/
                margin: 0; /*Remove default spacing*/
                display: flex;
                justify-content: center; /*Center canvas horizontally*/
                align-items: center; /*Center canvas vertically*/
                height: 100vh; /*full viewport height*/
                overflow: auto; /* Hides the scrollbar */
                
            }
            canvas{
                display: block; /*Remove inline spacing around canvas*/
                border: 2px solid white; /*Optional border for the canvas*/
            }
        </style>
    </head>
    <body>
        <canvas id="gameCanvas" width="560" height="560"></canvas>
        <script type="module" src="main.js"></script>
    </body>
</html>
